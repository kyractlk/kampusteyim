# Windows'tan iOS: Codemagic bulut Mac
# Team: 8496F2PR53 · Bundle: com.aystech.mtMobil
# SPM kapalı → CocoaPods (permission_handler Podfile flags)
#
# KRİTİK: App Store’a yalnızca --release IPA.
# Debug IPA home screen’den açılmaz (Guideline 2.1) ve
# iOS 26.5 ProMotion’da VSyncClient ile çöker (#187565).

workflows:
  ios-app-store:
    name: KampusteyimAPP iOS → TestFlight
    instance_type: mac_mini_m2
    max_build_duration: 120
    integrations:
      app_store_connect: KampusteyimASC
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.aystech.mtMobil
      vars:
        BUNDLE_ID: com.aystech.mtMobil
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Disable Swift Package Manager (use CocoaPods)
        script: |
          flutter config --no-enable-swift-package-manager
      - name: Code signing (automatic profiles)
        script: xcode-project use-profiles
      - name: Flutter pub get
        script: |
          flutter clean
          flutter pub get
          flutter --version
      - name: CocoaPods install
        script: |
          cd ios
          rm -rf Pods Podfile.lock .symlinks
          pod install --repo-update
      - name: Build number
        script: |
          # Mevcut major.minor.patch koru, build = Codemagic numarası
          sed -i '' -E "s/^version: ([0-9]+\.[0-9]+\.[0-9]+)\+.*/version: \1+$BUILD_NUMBER/" pubspec.yaml
          grep '^version:' pubspec.yaml
      - name: Flutter IPA RELEASE only
        script: |
          set -e
          echo "Building RELEASE IPA (never Debug)…"
          flutter build ipa --release \
            --no-tree-shake-icons \
            --export-options-plist=/Users/builder/export_options.plist
          IPA=$(ls -1 build/ios/ipa/*.ipa | head -1)
          echo "IPA: $IPA"
          # Debug binary App Store’a gitmesin
          if unzip -l "$IPA" | grep -qi 'Flutter.framework.*JIT\|kernel_blob.bin'; then
            echo "ERROR: Debug/JIT artifacts detected in IPA — aborting upload"
            exit 1
          fi
          echo "Release IPA OK"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      email:
        recipients:
          - alikayracatalkaya321@gmail.com
        notify:
          success: true
          failure: true
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false
